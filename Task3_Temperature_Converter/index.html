<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <h1>🌡️ Temperature Converter</h1>
        <p class="subtitle">Enter a value, pick a unit, and press Convert.</p>

        <label for="tempInput">Temperature value</label>
        <div class="input-row">
            <input type="number" id="tempInput" placeholder="e.g. 100" step="any" aria-label="Temperature value" />
            <select id="unitSelect" aria-label="Input unit">
                <option value="C">°C — Celsius</option>
                <option value="F">°F — Fahrenheit</option>
                <option value="K">K — Kelvin</option>
            </select>
        </div>

        <p class="error-msg" id="errorMsg" role="alert" aria-live="polite"></p>

        <button class="convert-btn" onclick="convert()">Convert</button>

        <div class="alert" id="alertBox" role="alert">
            ⚠️ <strong>Below absolute zero!</strong>
            Temperature cannot go lower than -273.15 °C (0 K).
            Please enter a physically valid value.
        </div>

        <div class="results" id="results">
            <p class="placeholder-text">↑ Enter a value above and press Convert</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
